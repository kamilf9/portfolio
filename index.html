<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kamil Fogel — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Roboto:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
    }

    body {
      background: #ffffff;
      color: #000000;
      font-family: 'Roboto', sans-serif;
    }

    .custom-cursor {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 10000;
      pointer-events: none;
      padding: 10px 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: #000000;
      color: #ffffff;
      font-family: 'Roboto', sans-serif;
      font-weight: 400;
      font-size: 14px;
      line-height: 1.25;
      letter-spacing: 0.02em;
      text-transform: lowercase;
      white-space: nowrap;
      transform: translate3d(-100px, -100px, 0);
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .custom-cursor.is-visible {
      opacity: 1;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 5000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2.5rem;
      background: transparent;
      font-family: 'Roboto', sans-serif;
      font-weight: 400;
      font-size: 16px;
    }

    nav .brand {
      color: inherit;
      text-decoration: none;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 1.75rem;
    }

    nav a {
      color: inherit;
      text-decoration: none;
      transition: filter 0.3s ease;
    }

    nav a:hover {
      filter: blur(4px);
    }

    .page-main {
      padding-top: 5.5rem;
    }

    .hero-view {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem 4rem;
      min-height: 55vh;
    }

    .hero-stage {
      width: 100%;
      max-width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1200px;
      perspective-origin: 50% 50%;
    }

    .hero-tilt {
      transform-style: preserve-3d;
      text-align: center;
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 166px;
      line-height: 1.04;
    }

    .hero-tilt span {
      display: block;
    }

    .projects-wrap {
      padding: 24px;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-gap: 24px;
      max-width: calc(828px * 2 + 24px);
      margin: 0 auto;
    }

    .project-hidden {
      opacity: 0;
      transform: translateY(40px);
      transition: all 0.8s cubic-bezier(0.2, 0.6, 0.2, 1);
    }

    .project-visible {
      opacity: 1;
      transform: translateY(0);
      transition: all 0.8s cubic-bezier(0.2, 0.6, 0.2, 1);
    }

    .projects-grid .project-card:nth-child(2n).project-visible {
      transition-delay: 0.14s;
    }

    .projects-grid .project-card:nth-child(2n).project-hidden {
      transition-delay: 0s;
    }

    .project-card {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .project-card__media {
      overflow: hidden;
      width: 828px;
      max-width: 100%;
      height: 622px;
    }

    .project-card__img {
      width: 828px;
      max-width: 100%;
      height: 622px;
      object-fit: cover;
      display: block;
      transform: scale(1);
      filter: blur(0);
      transition: transform 0.4s ease, filter 0.4s ease;
    }

    .project-card:hover .project-card__img {
      transform: scale(0.97);
      filter: blur(6px);
    }

    .project-card__name {
      font-family: 'Roboto', sans-serif;
      font-weight: 400;
      font-size: 20px;
      line-height: 1.3;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .project-card__type {
      font-family: 'Roboto', sans-serif;
      font-weight: 300;
      font-size: 16px;
      line-height: 1.4;
    }

    @media (max-width: 1750px) {
      .projects-grid {
        grid-template-columns: 1fr;
        max-width: 828px;
      }

      .project-card__media,
      .project-card__img {
        width: 100%;
        height: auto;
        aspect-ratio: 828 / 622;
        max-height: none;
      }

      .project-card__img {
        height: 100%;
        min-height: 280px;
      }
    }
  </style>
</head>
<body>
  <div id="customCursor" class="custom-cursor" aria-hidden="true">
    <span class="custom-cursor__label" id="cursorLabel">scroll</span>
  </div>

  <nav>
    <a class="brand" href="#">Kamil Fogel</a>
    <ul>
      <li><a href="#work">work</a></li>
      <li><a href="#">about</a></li>
      <li><a href="#">contact</a></li>
    </ul>
  </nav>

  <main class="page-main">
    <section class="hero-view">
      <div class="hero-stage">
        <div class="hero-tilt" id="heroTilt" aria-label="Introduction">
          <span>HI, I'm Kamil,</span>
          <span>A UX/UI Designer</span>
        </div>
      </div>
    </section>

    <section class="projects-wrap" id="work" aria-label="Selected work">
      <div class="projects-grid">
        <article class="project-card js-project-cursor project-hidden js-project-reveal">
          <div class="project-card__media">
            <img
              class="project-card__img"
              src="images/devill.png"
              alt="House of de Vill project"
              width="828"
              height="622"
            />
          </div>
          <div class="project-card__meta">
            <h2 class="project-card__name">HOUSE OF DE VILL</h2>
            <p class="project-card__type">Web design</p>
          </div>
        </article>

        <article class="project-card js-project-cursor project-hidden js-project-reveal">
          <div class="project-card__media">
            <img
              class="project-card__img"
              src="images/now.png"
              alt="Now project"
              width="828"
              height="622"
            />
          </div>
          <div class="project-card__meta">
            <h2 class="project-card__name">NOW</h2>
            <p class="project-card__type">App design</p>
          </div>
        </article>

        <article class="project-card js-project-cursor project-hidden js-project-reveal">
          <div class="project-card__media">
            <img
              class="project-card__img"
              src="images/balanced.png"
              alt="Balanced project"
              width="828"
              height="622"
            />
          </div>
          <div class="project-card__meta">
            <h2 class="project-card__name">BALANCED</h2>
            <p class="project-card__type">Vibe coding, app design</p>
          </div>
        </article>

        <article class="project-card js-project-cursor project-hidden js-project-reveal">
          <div class="project-card__media">
            <img
              class="project-card__img"
              src="images/metgala.png"
              alt="The Met Gala project"
              width="828"
              height="622"
            />
          </div>
          <div class="project-card__meta">
            <h2 class="project-card__name">THE MET GALA</h2>
            <p class="project-card__type">Web design</p>
          </div>
        </article>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var cursorEl = document.getElementById('customCursor');
      var cursorLabelEl = document.getElementById('cursorLabel');
      var heroEl = document.getElementById('heroTilt');
      var projectCards = document.querySelectorAll('.js-project-cursor');
      var revealTargets = document.querySelectorAll('.js-project-reveal');

      if (!cursorEl || !heroEl) return;

      var CURSOR_OFFSET_X = 20;
      var CURSOR_OFFSET_Y = 22;
      var heroMaxX = 7;
      var heroMaxY = 9;
      var smoothing = 0.12;

      var heroState = { cx: 0, cy: 0, tx: 0, ty: 0 };
      var projectHover = false;
      var rafId = null;

      function setCursorLabel() {
        if (!cursorLabelEl) return;
        cursorLabelEl.textContent = projectHover ? 'view' : 'scroll';
      }

      function setTargetsFromNormalized(nx, ny, maxRx, maxRy, state) {
        state.ty = nx * maxRy * 2;
        state.tx = -ny * maxRx * 2;
      }

      function moveCustomCursor(clientX, clientY) {
        var x = clientX + CURSOR_OFFSET_X;
        var y = clientY + CURSOR_OFFSET_Y;
        cursorEl.style.transform = 'translate3d(' + x + 'px, ' + y + 'px, 0)';
        cursorEl.classList.add('is-visible');
      }

      function lerpState(state) {
        state.cx += (state.tx - state.cx) * smoothing;
        state.cy += (state.ty - state.cy) * smoothing;
      }

      function applyHeroTransform() {
        heroEl.style.transform =
          'rotateX(' + heroState.cx.toFixed(3) + 'deg) rotateY(' + heroState.cy.toFixed(3) + 'deg)';
      }

      function tick() {
        lerpState(heroState);
        applyHeroTransform();

        var heroMoving =
          Math.abs(heroState.tx - heroState.cx) > 0.002 ||
          Math.abs(heroState.ty - heroState.cy) > 0.002;

        if (heroMoving) {
          rafId = requestAnimationFrame(tick);
        } else {
          rafId = null;
        }
      }

      function scheduleTick() {
        if (rafId === null) rafId = requestAnimationFrame(tick);
      }

      function onMouseMove(e) {
        moveCustomCursor(e.clientX, e.clientY);

        var w = window.innerWidth || 1;
        var h = window.innerHeight || 1;
        setTargetsFromNormalized(e.clientX / w - 0.5, e.clientY / h - 0.5, heroMaxX, heroMaxY, heroState);

        scheduleTick();
      }

      function onDocumentLeave() {
        projectHover = false;
        setCursorLabel();
        heroState.tx = heroState.ty = 0;
        cursorEl.classList.remove('is-visible');
        scheduleTick();
      }

      function onProjectEnter() {
        projectHover = true;
        setCursorLabel();
      }

      function onProjectLeave() {
        projectHover = false;
        setCursorLabel();
      }

      for (var i = 0; i < projectCards.length; i++) {
        projectCards[i].addEventListener('mouseenter', onProjectEnter);
        projectCards[i].addEventListener('mouseleave', onProjectLeave);
      }

      if ('IntersectionObserver' in window) {
        var revealObserver = new IntersectionObserver(
          function (entries) {
            for (var r = 0; r < entries.length; r++) {
              var entry = entries[r];
              if (!entry.isIntersecting) continue;
              if (entry.intersectionRatio < 0.175) continue;
              var el = entry.target;
              el.classList.remove('project-hidden');
              el.classList.add('project-visible');
              revealObserver.unobserve(el);
            }
          },
          {
            root: null,
            rootMargin: '0px 0px -12% 0px',
            threshold: [0, 0.1, 0.15, 0.175, 0.2, 0.25, 0.35, 0.5],
          }
        );
        for (var j = 0; j < revealTargets.length; j++) {
          revealObserver.observe(revealTargets[j]);
        }
      } else {
        for (var k = 0; k < revealTargets.length; k++) {
          revealTargets[k].classList.remove('project-hidden');
          revealTargets[k].classList.add('project-visible');
        }
      }

      window.addEventListener('mousemove', onMouseMove);
      document.documentElement.addEventListener('mouseleave', onDocumentLeave);
      window.addEventListener('blur', onDocumentLeave);

      setCursorLabel();
      scheduleTick();
    })();
  </script>
</body>
</html>
