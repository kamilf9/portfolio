<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kamil Fogel — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
    }

    body {
      background: #ffffff;
      color: #000000;
      font-family: 'Roboto', sans-serif;
    }

    .custom-cursor {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 10000;
      pointer-events: none;
      padding: 10px 16px;
      width: max-content;
      max-width: min(92vw, 28rem);
      min-height: 2.25rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: #000000;
      color: #ffffff;
      font-family: 'Roboto', sans-serif;
      font-weight: 400;
      font-size: 15px;
      line-height: 1.3;
      letter-spacing: 0.02em;
      white-space: nowrap;
      transform: translate3d(-100px, -100px, 0);
      will-change: transform, opacity;
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .custom-cursor.is-visible {
      opacity: 1;
    }

    .custom-cursor__label {
      display: block;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 5000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2.5rem;
      background: transparent;
      font-family: 'Roboto', sans-serif;
      font-weight: 400;
      font-size: 16px;
    }

    nav .brand {
      color: inherit;
      text-decoration: none;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 1.75rem;
    }

    nav a {
      color: inherit;
      text-decoration: none;
      transition: filter 0.3s ease;
    }

    nav a:hover {
      filter: blur(4px);
    }

    .hero-fixed {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .hero-stage {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1200px;
      perspective-origin: 50% 50%;
    }

    .hero-tilt {
      transform-style: preserve-3d;
      will-change: transform;
      text-align: center;
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 166px;
      line-height: 1.04;
    }

    .hero-tilt span {
      display: block;
    }

    .parallax-layer {
      position: relative;
      z-index: 20;
      min-height: 230vh;
      background: transparent;
      pointer-events: none;
    }

    .parallax-inner {
      position: relative;
      width: 100%;
      padding-top: 100vh;
    }

    .float-group {
      position: relative;
      width: 100%;
      pointer-events: none;
    }

    .float-item-anchor {
      position: absolute;
      pointer-events: auto;
      max-width: 40vw;
      width: min(40vw, 100%);
      transform: translate(-50%, 0);
    }

    .js-parallax-shift {
      will-change: transform;
    }

    .float-img-frame {
      position: relative;
      display: block;
      width: 100%;
      cursor: none;
    }

    .float-img {
      display: block;
      width: 100%;
      height: auto;
      opacity: 1;
      transform: scale(1);
      transform-origin: center center;
      filter: drop-shadow(0 18px 40px rgba(0, 0, 0, 0.18));
      transition: transform 0.4s ease, opacity 0.4s ease;
    }

    .float-img-frame:hover .float-img {
      transform: scale(1.05);
    }

    /* Duo: devill (L) + now (R), tight pair */
    .float-group--duo {
      padding-bottom: 44.8vh;
    }

    .float-duo {
      position: relative;
      min-height: 38vh;
      width: 100%;
    }

    .float-item-anchor--devill {
      left: 19%;
      top: 0;
    }

    .float-item-anchor--now {
      left: 71%;
      top: 5.4vh;
    }

    /* Solo: balanced, center-left, generous space */
    .float-group--solo {
      min-height: 112vh;
      padding-top: 10vh;
      padding-bottom: 44.8vh;
    }

    .float-item-anchor--balanced {
      left: 34%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    /* Final pair: met gala + scnd, bottom-right scatter */
    .float-group--finale {
      min-height: 92vh;
      padding-bottom: 14vh;
    }

    .float-item-anchor--metgala {
      left: 60%;
      top: 8%;
      transform: translate(-50%, 0);
    }

    .float-item-anchor--scnd {
      left: 80%;
      top: 42%;
      transform: translate(-50%, 0);
    }
  </style>
</head>
<body>
  <div id="customCursor" class="custom-cursor" aria-hidden="true">
    <span class="custom-cursor__label" id="cursorLabel">scroll</span>
  </div>

  <nav>
    <a class="brand" href="#">Kamil Fogel</a>
    <ul>
      <li><a href="#work">work</a></li>
      <li><a href="#about">about</a></li>
      <li><a href="#contact">contact</a></li>
    </ul>
  </nav>

  <div class="hero-fixed">
    <div class="hero-stage">
      <div class="hero-tilt" id="heroTilt" aria-label="Introduction">
        <span>HI, I'm Kamil,</span>
        <span>A UX/UI Designer</span>
      </div>
    </div>
  </div>

  <div class="parallax-layer" id="work">
    <div class="parallax-inner">
      <section class="float-group float-group--duo" aria-label="Projects duo">
        <div class="float-duo">
          <div class="float-item-anchor float-item-anchor--devill">
            <div class="js-parallax-shift" data-speed="-0.14">
              <div
                class="float-img-frame js-image-hover"
                data-cursor-name="HOUSE OF DE VILL"
                data-cursor-type="web design"
              >
                <img
                  class="float-img"
                  src="images/devill.png"
                  alt="House of de Vill"
                />
              </div>
            </div>
          </div>
          <div class="float-item-anchor float-item-anchor--now">
            <div class="js-parallax-shift" data-speed="0.22">
              <div
                class="float-img-frame js-image-hover"
                data-cursor-name="NOW WEATHER"
                data-cursor-type="app design"
              >
                <img
                  class="float-img"
                  src="images/now.png"
                  alt="Now"
                />
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="float-group float-group--solo" aria-label="Project solo">
        <div class="float-item-anchor float-item-anchor--balanced">
          <div class="js-parallax-shift" data-speed="-0.08">
            <div
              class="float-img-frame js-image-hover"
              data-cursor-name="BALANCED"
              data-cursor-type="app design"
            >
              <img
                class="float-img"
                src="images/balanced.png"
                alt="Balanced"
              />
            </div>
          </div>
        </div>
      </section>

      <section class="float-group float-group--finale" aria-label="Projects pair">
        <div class="float-item-anchor float-item-anchor--metgala">
          <div class="js-parallax-shift" data-speed="0.18">
            <div
              class="float-img-frame js-image-hover"
              data-cursor-name="THE MET GALA"
              data-cursor-type="web design"
            >
              <img
                class="float-img"
                src="images/metgala.png"
                alt="Met Gala"
              />
            </div>
          </div>
        </div>
        <div class="float-item-anchor float-item-anchor--scnd">
          <div class="js-parallax-shift" data-speed="-0.2">
            <div
              class="float-img-frame js-image-hover"
              data-cursor-name="SCND"
              data-cursor-type="branding"
            >
              <img
                class="float-img"
                src="images/scnd.png"
                alt="SCND"
              />
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    (function () {
      var cursorEl = document.getElementById('customCursor');
      var cursorLabelEl = document.getElementById('cursorLabel');
      var heroEl = document.getElementById('heroTilt');
      var parallaxShifts = document.querySelectorAll('.js-parallax-shift');
      var imageFrames = document.querySelectorAll('.js-image-hover');

      if (!cursorEl || !heroEl) return;

      var CURSOR_OFFSET_X = 20;
      var CURSOR_OFFSET_Y = 22;
      var SCROLL_LABEL_FADE_PX = 10;

      var heroMaxX = 7;
      var heroMaxY = 9;
      var smoothing = 0.12;

      var heroState = { cx: 0, cy: 0, tx: 0, ty: 0 };
      var imageHover = false;
      var cursorProjectLine = '';
      var rafId = null;
      var parallaxRaf = null;

      function setTargetsFromNormalized(nx, ny, maxRx, maxRy, state) {
        state.ty = nx * maxRy * 2;
        state.tx = -ny * maxRx * 2;
      }

      function moveCustomCursor(clientX, clientY) {
        var x = clientX + CURSOR_OFFSET_X;
        var y = clientY + CURSOR_OFFSET_Y;
        cursorEl.style.transform = 'translate3d(' + x + 'px, ' + y + 'px, 0)';
      }

      function syncCursorLabelVisibility() {
        var y = window.scrollY || window.pageYOffset || 0;
        var showLabel = imageHover || y <= SCROLL_LABEL_FADE_PX;
        cursorEl.classList.toggle('is-visible', showLabel);
      }

      function updateCursorLabel() {
        if (!cursorLabelEl) return;
        if (imageHover && cursorProjectLine) {
          cursorLabelEl.textContent = cursorProjectLine;
        } else {
          cursorLabelEl.textContent = 'scroll';
        }
        syncCursorLabelVisibility();
      }

      function applyParallax() {
        var y = window.scrollY || window.pageYOffset || 0;
        for (var i = 0; i < parallaxShifts.length; i++) {
          var el = parallaxShifts[i];
          var speed = parseFloat(el.getAttribute('data-speed'));
          if (isNaN(speed)) speed = 0;
          var offset = y * speed;
          el.style.transform = 'translate3d(0, ' + offset.toFixed(2) + 'px, 0)';
        }
      }

      function onScrollParallax() {
        if (parallaxRaf !== null) return;
        parallaxRaf = requestAnimationFrame(function () {
          parallaxRaf = null;
          applyParallax();
        });
      }

      function onScroll() {
        updateCursorLabel();
        onScrollParallax();
      }

      function lerpState(state) {
        state.cx += (state.tx - state.cx) * smoothing;
        state.cy += (state.ty - state.cy) * smoothing;
      }

      function applyHeroTransform() {
        heroEl.style.transform =
          'rotateX(' + heroState.cx.toFixed(3) + 'deg) rotateY(' + heroState.cy.toFixed(3) + 'deg)';
      }

      function tick() {
        lerpState(heroState);
        applyHeroTransform();

        var heroMoving =
          Math.abs(heroState.tx - heroState.cx) > 0.002 ||
          Math.abs(heroState.ty - heroState.cy) > 0.002;

        if (heroMoving) {
          rafId = requestAnimationFrame(tick);
        } else {
          rafId = null;
        }
      }

      function scheduleTick() {
        if (rafId === null) rafId = requestAnimationFrame(tick);
      }

      function onMouseMove(e) {
        moveCustomCursor(e.clientX, e.clientY);

        var w = window.innerWidth || 1;
        var h = window.innerHeight || 1;
        setTargetsFromNormalized(e.clientX / w - 0.5, e.clientY / h - 0.5, heroMaxX, heroMaxY, heroState);

        scheduleTick();
      }

      function resetHeroTilt() {
        heroState.tx = heroState.ty = 0;
        scheduleTick();
      }

      function onDocumentLeave() {
        imageHover = false;
        cursorProjectLine = '';
        resetHeroTilt();
        updateCursorLabel();
        scheduleTick();
      }

      function onImageFrameEnter(e) {
        imageHover = true;
        var name = (e.currentTarget.getAttribute('data-cursor-name') || '').trim();
        var type = (e.currentTarget.getAttribute('data-cursor-type') || '').trim().toLowerCase();
        cursorProjectLine = name && type ? name + ' - ' + type : '';
        updateCursorLabel();
      }

      function onImageFrameLeave() {
        imageHover = false;
        cursorProjectLine = '';
        updateCursorLabel();
      }

      for (var j = 0; j < imageFrames.length; j++) {
        imageFrames[j].addEventListener('mouseenter', onImageFrameEnter);
        imageFrames[j].addEventListener('mouseleave', onImageFrameLeave);
      }

      window.addEventListener('mousemove', onMouseMove);
      document.documentElement.addEventListener('mouseleave', onDocumentLeave);
      window.addEventListener('blur', onDocumentLeave);
      window.addEventListener('scroll', onScroll, { passive: true });

      updateCursorLabel();
      applyParallax();
      scheduleTick();
    })();
  </script>
</body>
</html>
